{% extends "functional_mini_vk/base.html" %}

{% block content %}
<h1>Профили</h1>

<ul>
    {% for profile in profiles %}
        <li>
            <a href="{% url 'functional_mini_vk:profile' profile.id %}">
                {{ profile.user.username }}
            </a>
        </li>
    {% empty %}
        <li>Профилей пока нет.</li>
    {% endfor %}
</ul>

{% endblock content %}
